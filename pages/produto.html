<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { nissan: { red: '#c3002f', dark: '#121212', light: '#f4f4f4' } } } }
        }
    </script>
    <script src="../main.js" defer></script>
</head>
<body class="bg-nissan-light text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <header class="bg-nissan-dark text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-wider hover:text-gray-300">
                <span class="text-nissan-red">Nissan GTR</span> Nismo
            </a>
            <a href="../index.html" class="text-sm font-bold text-gray-300 hover:text-white">← Voltar para a Loja</a>
        </div>
    </header>

    <main class="flex-grow bg-gray-900 text-white py-16" id="produto-container">
        <div class="container mx-auto px-4 max-w-5xl">
            
            <div class="bg-nissan-dark rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-700">
                
                <div class="w-full md:w-1/2 p-8 bg-gray-800 flex items-center justify-center">
                    <img id="prod-img" src="" alt="Carregando..." class="max-h-96 w-auto object-contain drop-shadow-2xl">
                </div>

                <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                    <span class="text-nissan-red font-bold text-sm tracking-widest mb-2 uppercase">Peça Genuína</span>
                    <h1 id="prod-nome" class="text-3xl md:text-4xl font-bold mb-4">Carregando...</h1>
                    
                    <p id="prod-desc" class="text-gray-400 text-lg leading-relaxed mb-8">
                        Aguarde, carregando informações do produto...
                    </p>
                    
                    <div class="mt-auto">
                        <p class="text-sm text-gray-400 mb-1">Preço à vista</p>
                        <p id="prod-preco" class="text-4xl font-bold text-white mb-6">R$ 0,00</p>
                        
                        <button id="btn-add-carrinho" class="w-full bg-nissan-red py-4 rounded-lg font-bold text-lg hover:bg-red-700 transition-colors shadow-lg hover:shadow-red-900/50 flex items-center justify-center gap-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                Adicionar ao Carrinho
                            </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
